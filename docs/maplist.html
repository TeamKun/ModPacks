<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="./style.css">
  <title>マップ一覧 | KUNLab</title>
<style>
  :root{
    --gap:.5rem;
    --pad:.6rem;
    --border:#cbd5e1;
    --border2:#d1d5db;
    --head:#f3f4f6;
    --zebra:#fafafa;
  }
  *{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;line-height:1.5;margin:0;padding:0;}
  h1{font-size:1.4rem;margin:0 0 .5rem;}
  .subtitle{font-size:.9rem;opacity:.8;margin-left:.25rem;}

  .toolbar{
    display:grid;
    gap:var(--gap);
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    align-items:end;
    margin:.75rem 0;
  }
  .toolbar label{font-size:.9rem;display:grid;gap:.25rem;min-width:0;}
  .toolbar .row2{
    grid-column:1 / -1; display:flex; gap:.75rem; align-items:center; flex-wrap:wrap;
  }

  button,select,input{
    padding:.4rem .5rem; border:1px solid var(--border); border-radius:4px; background:#fff;
    width:100%; min-width:0;
  }
  input[type="search"]{min-width:0;}

  .count{margin:.5rem 0;font-weight:600;}

  .table-wrap{overflow:auto;border:1px solid var(--border2);border-radius:6px;}
  table{border-collapse:collapse;min-width:600px;width:100%;}
  thead th{position:sticky;top:0;background:var(--head);font-weight:700;border-bottom:1px solid var(--border);padding:.5rem var(--pad);text-align:left;}
  tbody td{border-bottom:1px solid #e5e7eb;padding:.45rem var(--pad);vertical-align:top;}
  tbody tr:nth-child(odd){background:var(--zebra);}
  .small{font-size:.9rem;opacity:.9;}
  .break{word-break:break-all;}
  tbody tr:hover {
    background-color: #cdd2d8;
    transition: background-color 0.05s ease-in-out;
  }

  @media (max-width: 420px){
    .toolbar{grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));}
  }

  /* ===== コンパクト固定ヘッダー ===== */
  header {
    position: sticky;
    top: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #111827;
    color: #fff;
    padding: 0.9rem 1rem;
    margin: 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  header nav {
    display: flex;
    gap: 0.6rem;
  }

  header a {
    color: #e5e7eb;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    transition: background 0.2s ease, color 0.2s ease;
  }

  header a:hover {
    color: #fff;
    background: rgba(255, 255, 255, 0.15);
  }

  header a.active {
    background: rgba(255, 255, 255, 0.25);
    color: #fff;
    font-weight: 700;
  }

  .content {
    padding:2rem;
  }
</style>
</head>
<body>
<header>
  <nav>
    <a href="./modlist.html">MOD</a>
    <a href="./addonlist.html">Addon</a>
    <a href="./maplist.html" class="active">Map</a>
    <a href="./check.html">Check</a>
  </nav>
</header>
<div class="content">
  <h1>
    マップ一覧
    <span class="subtitle">by KUNLab</span>
  </h1>

  <div class="toolbar" role="region" aria-label="フィルター">
    <label>
      キーワード（マップ名 / 作者）
      <input id="q" type="search" placeholder="例）skyblock / hypixel">
    </label>

    <div class="row2">
      <label>
        並び替え
        <select id="sort">
          <option value="name_asc">マップ名 昇順</option>
          <option value="name_desc">マップ名 降順</option>
          <option value="author_asc">作者 昇順</option>
          <option value="author_desc">作者 降順</option>
        </select>
      </label>
      <button id="reset" type="button">フィルタをリセット</button>
    </div>
  </div>

  <div id="count" class="count" aria-live="polite"></div>

  <div class="table-wrap">
    <table aria-label="マップ一覧テーブル">
      <thead>
        <tr>
          <th class="nowrap">マップ名</th>
          <th class="nowrap">作者</th>
          <th class="nowrap">URL</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script src="./script.js"></script>
  <script>
    const debounce = (fn, ms = 200) => {
      let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
    };

    let ALL = [];

    const els = {
      q: document.getElementById("q"),
      sort: document.getElementById("sort"),
      reset: document.getElementById("reset"),
      count: document.getElementById("count"),
      tbody: document.getElementById("tbody"),
    };

    const normalize = (s) => (s ?? "").toString().toLowerCase();

    function applyFilters() {
      const q = normalize(els.q.value);
      const sort = els.sort.value;

      let rows = ALL.filter(r => {
        if (q) {
          const hay = [normalize(r.name), normalize(r.author)].join(" ");
          if (!hay.includes(q)) return false;
        }
        return true;
      });

      const keyMap = {
        name: r => r.name || "",
        author: r => r.author || "",
      };
      const [key, dir] = sort.split("_");
      rows.sort((a, b) => {
        const A = normalize(keyMap[key](a));
        const B = normalize(keyMap[key](b));
        const cmp = A.localeCompare(B, undefined, { sensitivity: "base" });
        return dir === "asc" ? cmp : -cmp;
      });

      render(rows);
    }

    function render(rows) {
      els.tbody.innerHTML = "";
      els.count.textContent = `表示 ${rows.length} 件 / 全体 ${ALL.length} 件`;

      const frag = document.createDocumentFragment();

      for (const m of rows) {
        const tr = document.createElement("tr");

        const tdName = document.createElement("td");
        tdName.textContent = m.name || "";
        tdName.style.fontWeight = "700";

        const tdAuthor = document.createElement("td");
        tdAuthor.textContent = m.author || "";
        tdAuthor.className = "small";

        const tdUrl = document.createElement("td");
        if (m.url) {
          const a = document.createElement("a");
          a.href = m.url;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.textContent = m.url;
          a.className = "break";
          tdUrl.appendChild(a);
        }
        tdUrl.className = "small";

        tr.append(tdName, tdAuthor, tdUrl);
        frag.appendChild(tr);
      }

      els.tbody.appendChild(frag);
    }

    function wireEvents() {
      const onChange = debounce(applyFilters, 120);
      els.q.addEventListener("input", onChange);
      els.sort.addEventListener("change", onChange);

      els.reset.addEventListener("click", () => {
        els.q.value = "";
        els.sort.value = "name_asc";
        applyFilters();
      });
    }

    window.addEventListener("DOMContentLoaded", async () => {
      try {
        const res = await fetch("./maplist.json", { cache: "no-store" });
        if (!res.ok) throw new Error(`Failed: ${res.status}`);
        ALL = await res.json();
        wireEvents();
        applyFilters();
      } catch (e) {
        console.error(e);
        els.tbody.innerHTML = '<tr><td colspan="3">読み込みエラー</td></tr>';
      }
    });
  </script>
</div>
</body>
</html>
